[ARTS]
# Cluster configuration (64 threads)

# Worker threads per node (default: 4)
# Single node: all threads become workers
# Multi-node: workers = worker_threads - sender_threads - receiver_threads
worker_threads=64

# Initial worker deque size (default: 4096)
worker_init_deque_size=2048

# Routing table size as power of 2 (default: 20)
route_table_size=16

# Networking
sender_threads=2
receiver_threads=2
port_count=6
net_interface=ib0

# Launcher
launcher=ssh
master_node=localhost
node_count=1
nodes=localhost:34739
default_ports=34739
