# ARTS Counter Profile: WORKLOAD CHARACTERIZATION
# ================================================
#
# Captures workload metrics at CLUSTER level for understanding runtime behavior:
# - Task execution patterns (EDT counts, running time)
# - Data block operations
# - Memory usage
# - Communication patterns
#
# Usage:
#   carts build --arts --counters=2
#   carts build --arts --profile=profile-workload.cfg

# EDT Counters - task execution patterns
edtRunningTime=PERIODIC,CLUSTER
numEdtsCreated=PERIODIC,CLUSTER
numEdtsAcquired=PERIODIC,CLUSTER
numEdtsFinished=PERIODIC,CLUSTER

# DB Counters - data block patterns
numDbsCreated=PERIODIC,CLUSTER

# Memory Counters
memoryFootprint=PERIODIC,CLUSTER

# Remote Counters - communication patterns
remoteBytesSent=PERIODIC,CLUSTER
remoteBytesReceived=PERIODIC,CLUSTER

# Timing Counters
initializationTime=ONCE,CLUSTER,MASTER
endToEndTime=ONCE,CLUSTER,MASTER

# Acquire-Mode Counters
acquireReadMode=OFF
acquireWriteMode=OFF
ownerUpdatesSaved=OFF
ownerUpdatesPerformed=OFF

# ArtsID Tracking
artsIdEdtMetrics=OFF
artsIdDbMetrics=OFF
artsIdEdtCaptures=OFF
artsIdDbCaptures=OFF
