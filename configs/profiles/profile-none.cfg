# ARTS Counter Profile: ALL OFF
# ==============================
#
# Use for baseline performance measurements without counter overhead.
#
# Usage:
#   carts build --arts --counters=0
#   carts build --arts --profile=configs/profile-none.cfg

# EDT Counters
edtRunningTime=OFF
numEdtsCreated=OFF
numEdtsAcquired=OFF
numEdtsFinished=OFF

# DB Counters
numDbsCreated=OFF

# Memory Counters
memoryFootprint=OFF

# Remote Counters
remoteBytesSent=OFF
remoteBytesReceived=OFF

# Timing Counters
initializationTime=OFF
endToEndTime=OFF

# Acquire-Mode Counters
acquireReadMode=OFF
acquireWriteMode=OFF
ownerUpdatesSaved=OFF
ownerUpdatesPerformed=OFF

# ArtsID Tracking
artsIdEdtMetrics=OFF
artsIdDbMetrics=OFF
artsIdEdtCaptures=OFF
artsIdDbCaptures=OFF
