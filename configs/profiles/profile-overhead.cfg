# ARTS Counter Profile: FULL OVERHEAD ANALYSIS
# =============================================
#
# Captures comprehensive runtime overhead metrics at CLUSTER level.
# Use for detailed performance analysis and debugging.
#
# Usage:
#   carts build --arts --counters=3
#   carts build --arts --profile=configs/profile-overhead.cfg

# EDT Lifecycle
edtRunningTime=ONCE,CLUSTER
numEdtsCreated=ONCE,CLUSTER
numEdtsAcquired=ONCE,CLUSTER
numEdtsFinished=ONCE,CLUSTER

# DB Lifecycle
numDbsCreated=ONCE,CLUSTER

# Memory
memoryFootprint=ONCE,CLUSTER

# Remote Communication
remoteBytesSent=ONCE,CLUSTER
remoteBytesReceived=ONCE,CLUSTER

# Timing Counters
initializationTime=ONCE,CLUSTER,MASTER
endToEndTime=ONCE,CLUSTER,MASTER

# Acquire-Mode Override Effectiveness
acquireReadMode=ONCE,CLUSTER
acquireWriteMode=ONCE,CLUSTER
ownerUpdatesSaved=ONCE,CLUSTER
ownerUpdatesPerformed=ONCE,CLUSTER

# ArtsID Tracking (disabled by default, enable for per-task attribution)
artsIdEdtMetrics=OFF
artsIdDbMetrics=OFF
artsIdEdtCaptures=OFF
artsIdDbCaptures=OFF
