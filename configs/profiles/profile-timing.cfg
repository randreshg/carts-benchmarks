# ARTS Counter Profile: TIMING ONLY (DEFAULT)
# ============================================
#
# Captures only initialization and end-to-end timing with minimal overhead.
# This is the default profile for benchmarking.
#
# Usage:
#   carts build --arts --counters=1
#   carts build --arts --profile=configs/profile-timing.cfg

# EDT Counters
edtRunningTime=OFF
numEdtsCreated=OFF
numEdtsAcquired=OFF
numEdtsFinished=OFF

# DB Counters
numDbsCreated=OFF

# Memory Counters
memoryFootprint=OFF

# Remote Counters
remoteBytesSent=OFF
remoteBytesReceived=OFF

# Timing Counters (ENABLED)
initializationTime=ONCE,CLUSTER,MASTER
endToEndTime=ONCE,CLUSTER,MASTER

# Acquire-Mode Counters
acquireReadMode=OFF
acquireWriteMode=OFF
ownerUpdatesSaved=OFF
ownerUpdatesPerformed=OFF

# ArtsID Tracking
artsIdEdtMetrics=OFF
artsIdDbMetrics=OFF
artsIdEdtCaptures=OFF
artsIdDbCaptures=OFF
