[ARTS]
# Default single-node benchmark configuration.
# Thread sweeps are generated from this template by the benchmark runner.

worker_threads=16

# Single-node runs should not reserve network threads; ARTS would reclaim them.
sender_threads=0
receiver_threads=0
port_count=1

pin=1
worker_init_deque_size=2048
route_table_size=16
core_dump=1

launcher=local
master_node=localhost
node_count=1
nodes=localhost

protocol=tcp
default_ports=34739

counter_folder=./counters
counter_capture_interval=100
kill_mode=0
