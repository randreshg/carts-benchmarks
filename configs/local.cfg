[ARTS]
# Local single-node configuration

# Worker threads per node (default: 4)
worker_threads=20

# Networking (ignored for single node)
sender_threads=1
receiver_threads=1
port_count=1

# Launcher
launcher=local
master_node=localhost
node_count=1
nodes=localhost
default_ports=50000

# Debug
core_dump=1
kill_mode=0
